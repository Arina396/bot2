<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мои события</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        
        h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px 0;
            border-radius: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            font-size: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:active {
            opacity: 0.8;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        
        .card h4 {
            margin-bottom: 8px;
            font-size: 18px;
        }
        
        .card p {
            margin-bottom: 8px;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .card small {
            font-size: 12px;
            opacity: 0.6;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }
        
        .error {
            color: #e53935;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Мои события</h1>
        
        <div class="form-card">
            <h3>➕ Добавить новое</h3>
            <select id="typeSelect">
                <option value="мероприятие">🎉 Мероприятие</option>
                <option value="конкурс">🏆 Конкурс</option>
                <option value="дизайн">🎨 Дизайн</option>
            </select>
            <input type="text" id="titleInput" placeholder="Название *">
            <textarea id="descInput" placeholder="Описание *" rows="3"></textarea>
            <input type="text" id="dateInput" placeholder="Дата (необязательно)">
            <button id="addBtn">➕ Добавить</button>
        </div>
        
        <h3>📋 Список записей</h3>
        <div id="listContainer">
            <div class="loading">Загрузка...</div>
        </div>
    </div>

    <!-- Загружаем Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script>
        // Ждём загрузки SDK
        let tg = null;
        
        // Функция инициализации
        function initTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                console.log("✅ Telegram WebApp инициализирован");
                console.log("👤 Пользователь:", tg.initDataUnsafe?.user);
                
                // Настраиваем главную кнопку
                tg.MainButton.setText("Закрыть");
                tg.MainButton.onClick(() => tg.close());
                tg.MainButton.show();
                
                // Загружаем данные
                loadItems();
            } else {
                console.log("⏳ Ждём загрузки Telegram SDK...");
                setTimeout(initTelegram, 100);
            }
        }
        
        // Запускаем инициализацию
        initTelegram();
        
        let currentType = 'events';
        
        // Функция отправки в бота
        async function sendToBot(action, data) {
            return new Promise((resolve, reject) => {
                if (!tg) {
                    reject(new Error('Telegram не инициализирован'));
                    return;
                }
                
                const requestId = Date.now();
                const message = JSON.stringify({ action, data, requestId });
                console.log("📤 Отправляем:", message);
                
                window._pending = { requestId, resolve, reject };
                tg.sendData(message);
                
                setTimeout(() => {
                    if (window._pending) {
                        reject(new Error('Нет ответа от бота'));
                        window._pending = null;
                    }
                }, 5000);
            });
        }
        
        // Загрузка записей
        async function loadItems() {
            const container = document.getElementById('listContainer');
            container.innerHTML = '<div class="loading">📥 Загрузка...</div>';
            
            try {
                console.log("📥 Запрашиваем тип:", currentType);
                const response = await sendToBot('get_items', { type: currentType });
                console.log("📦 Ответ:", response);
                
                if (response.items && response.items.length > 0) {
                    let html = '';
                    for (let item of response.items) {
                        const emoji = currentType === 'events' ? '🎉' : (currentType === 'contests' ? '🏆' : '🎨');
                        html += `
                            <div class="card">
                                <h4>${emoji} ${escapeHtml(item.title)}</h4>
                                <p>${escapeHtml(item.description.substring(0, 100))}${item.description.length > 100 ? '...' : ''}</p>
                                ${item.date ? `<small>📅 ${escapeHtml(item.date)}</small><br>` : ''}
                                <small>🆔 ID: ${item.id}</small>
                            </div>
                        `;
                    }
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="loading">📭 Пока ничего нет. Добавьте первую запись!</div>';
                }
            } catch (error) {
                console.error("❌ Ошибка:", error);
                container.innerHTML = `<div class="error">❌ Ошибка: ${error.message}</div>`;
            }
        }
        
        // Добавление записи
        async function addItem() {
            const type = document.getElementById('typeSelect').value;
            const title = document.getElementById('titleInput').value.trim();
            const description = document.getElementById('descInput').value.trim();
            const date = document.getElementById('dateInput').value.trim();
            
            if (!title || !description) {
                if (tg) {
                    tg.showPopup({
                        title: 'Ошибка',
                        message: 'Заполните название и описание!',
                        buttons: [{ type: 'ok' }]
                    });
                } else {
                    alert('Заполните название и описание!');
                }
                return;
            }
            
            const addBtn = document.getElementById('addBtn');
            addBtn.disabled = true;
            addBtn.textContent = 'Добавление...';
            
            try {
                const response = await sendToBot('add_item', { type, title, description, date });
                console.log("✅ Ответ:", response);
                
                if (response.success) {
                    if (tg) {
                        tg.showPopup({
                            title: 'Успех!',
                            message: 'Запись добавлена ✅',
                            buttons: [{ type: 'ok' }]
                        });
                    }
                    
                    // Очищаем форму
                    document.getElementById('titleInput').value = '';
                    document.getElementById('descInput').value = '';
                    document.getElementById('dateInput').value = '';
                    
                    // Обновляем список
                    loadItems();
                }
            } catch (error) {
                console.error("❌ Ошибка:", error);
                if (tg) {
                    tg.showPopup({
                        title: 'Ошибка',
                        message: 'Не удалось добавить запись',
                        buttons: [{ type: 'ok' }]
                    });
                }
            } finally {
                addBtn.disabled = false;
                addBtn.textContent = '➕ Добавить';
            }
        }
        
        // Обработчик ответа от бота
        window.handleTelegramResponse = function(event) {
            try {
                const data = JSON.parse(event.data);
                console.log("📨 Ответ от бота:", data);
                
                if (window._pending && window._pending.requestId === data.requestId) {
                    window._pending.resolve(data);
                    window._pending = null;
                }
            } catch (e) {
                console.error("Ошибка обработки ответа:", e);
            }
        };
        
        // Слушаем сообщения от бота
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.onEvent('message', window.handleTelegramResponse);
        }
        
        // Кнопка добавления
        document.getElementById('addBtn').addEventListener('click', addItem);
        
        // Смена типа
        document.getElementById('typeSelect').addEventListener('change', (e) => {
            const typeMap = {
                'мероприятие': 'events',
                'конкурс': 'contests',
                'дизайн': 'designs'
            };
            currentType = typeMap[e.target.value];
            loadItems();
        });
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
