<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мои события</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px 16px 32px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }

        .container { max-width: 600px; margin: 0 auto; }

        h1 { font-size: 26px; margin-bottom: 20px; text-align: center; }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .tab {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--tg-theme-hint-color, #ccc);
            background: transparent;
            color: var(--tg-theme-text-color, #000);
            font-size: 14px;
            cursor: pointer;
            width: auto;
            font-weight: 500;
            transition: all .15s;
        }

        .tab.active {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
            border-color: transparent;
        }

        .form-card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .form-card h3 { margin-bottom: 12px; font-size: 17px; }

        input, textarea, select {
            width: 100%;
            padding: 11px 13px;
            margin-bottom: 10px;
            border-radius: 12px;
            border: 1.5px solid var(--tg-theme-hint-color, #ddd);
            font-size: 15px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }

        textarea { resize: vertical; min-height: 72px; }

        .btn {
            width: 100%;
            padding: 13px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s;
        }

        .btn:active { opacity: .75; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .section-header h3 { font-size: 17px; }

        .count-badge {
            font-size: 12px;
            background: var(--tg-theme-secondary-bg-color, #eee);
            padding: 3px 9px;
            border-radius: 20px;
            opacity: .7;
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 10px;
            position: relative;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .card h4 { font-size: 16px; margin-bottom: 6px; flex: 1; }

        .delete-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            width: auto;
            padding: 0 0 0 6px;
            opacity: .5;
            flex-shrink: 0;
            line-height: 1;
        }

        .delete-btn:hover { opacity: 1; }

        .card p { font-size: 14px; opacity: .8; margin-bottom: 6px; line-height: 1.4; }
        .card small { font-size: 12px; opacity: .55; }

        .status {
            text-align: center;
            padding: 32px 0;
            opacity: .55;
            font-size: 15px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a1a;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 999;
            transition: transform .3s ease;
            white-space: nowrap;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: #c0392b; }
    </style>
</head>
<body>
<div class="container">
    <h1>🗂 Мои события</h1>

    <!-- Вкладки типов -->
    <div class="tabs">
        <button class="tab active" data-type="events">🎉 Мероприятия</button>
        <button class="tab" data-type="contests">🏆 Конкурсы</button>
        <button class="tab" data-type="designs">🎨 Дизайны</button>
    </div>

    <!-- Форма добавления -->
    <div class="form-card">
        <h3>➕ Новая запись</h3>
        <input type="text" id="titleInput" placeholder="Название *" maxlength="200">
        <textarea id="descInput" placeholder="Описание *"></textarea>
        <input type="text" id="dateInput" placeholder="Дата (необязательно)">
        <button class="btn" id="addBtn">Добавить</button>
    </div>

    <!-- Список -->
    <div class="section-header">
        <h3>📋 Список</h3>
        <span class="count-badge" id="countBadge">...</span>
    </div>
    <div id="listContainer">
        <div class="status">Загрузка...</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // ======= НАСТРОЙКИ =======
    // Замените на адрес вашего сервера (где запущен api.py)
    // Для локальной разработки с ngrok: 'https://ваш-id.ngrok.io'
    // Для VPS: 'https://ваш-домен.com'
    const API_URL = 'https://YOUR_SERVER_ADDRESS';  // <-- ЗАМЕНИТЕ
    // =========================

    const TYPE_EMOJI = { events: '🎉', contests: '🏆', designs: '🎨' };
    let currentType = 'events';
    let tg = null;

    // Инициализация Telegram WebApp
    if (window.Telegram && window.Telegram.WebApp) {
        tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    }

    // Получить username из Telegram
    function getAuthor() {
        return tg?.initDataUnsafe?.user?.first_name || 'webapp';
    }

    // Показать уведомление
    function showToast(msg, isError = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast show' + (isError ? ' error' : '');
        setTimeout(() => { el.className = 'toast'; }, 2500);
    }

    // Загрузить список
    async function loadItems() {
        const container = document.getElementById('listContainer');
        const badge = document.getElementById('countBadge');
        container.innerHTML = '<div class="status">Загрузка...</div>';
        badge.textContent = '...';

        try {
            const res = await fetch(`${API_URL}/api/items?type=${currentType}`);
            if (!res.ok) throw new Error(`Ошибка сервера: ${res.status}`);
            const items = await res.json();

            badge.textContent = `${items.length} зап.`;

            if (!items.length) {
                container.innerHTML = '<div class="status">📭 Пока ничего нет</div>';
                return;
            }

            const emoji = TYPE_EMOJI[currentType];
            container.innerHTML = items.map(item => `
                <div class="card" id="card-${item.id}">
                    <div class="card-header">
                        <h4>${emoji} ${esc(item.title)}</h4>
                        <button class="delete-btn" onclick="deleteItem(${item.id})" title="Удалить">✕</button>
                    </div>
                    <p>${esc(item.description.substring(0, 150))}${item.description.length > 150 ? '…' : ''}</p>
                    <small>${item.date ? '📅 ' + esc(item.date) + ' · ' : ''}🆔 ${item.id}</small>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = `<div class="status">⚠️ Не удалось загрузить данные.<br>Сервер недоступен.</div>`;
            badge.textContent = '!';
            console.error(e);
        }
    }

    // Добавить запись
    async function addItem() {
        const title       = document.getElementById('titleInput').value.trim();
        const description = document.getElementById('descInput').value.trim();
        const date        = document.getElementById('dateInput').value.trim();

        if (!title || !description) {
            showToast('Заполните название и описание', true);
            return;
        }

        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        btn.textContent = 'Сохраняю...';

        try {
            const res = await fetch(`${API_URL}/api/items`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ type: currentType, title, description, date, author: getAuthor() }),
            });

            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error || 'Ошибка сервера');
            }

            document.getElementById('titleInput').value = '';
            document.getElementById('descInput').value  = '';
            document.getElementById('dateInput').value  = '';

            showToast('✅ Добавлено!');
            loadItems();
        } catch (e) {
            showToast(e.message, true);
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Добавить';
        }
    }

    // Удалить запись
    async function deleteItem(id) {
        const confirmed = tg
            ? await new Promise(res => tg.showConfirm('Удалить запись?', res))
            : confirm('Удалить запись?');

        if (!confirmed) return;

        try {
            const r = await fetch(`${API_URL}/api/items/${id}`, { method: 'DELETE' });
            if (!r.ok) throw new Error('Не удалось удалить');
            document.getElementById(`card-${id}`)?.remove();
            showToast('Удалено');
            // Обновить счётчик
            const badge = document.getElementById('countBadge');
            const current = parseInt(badge.textContent) || 0;
            badge.textContent = `${Math.max(0, current - 1)} зап.`;
        } catch (e) {
            showToast(e.message, true);
        }
    }

    // Экранирование HTML
    function esc(text) {
        if (!text) return '';
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    // Вкладки
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentType = tab.dataset.type;
            loadItems();
        });
    });

    document.getElementById('addBtn').addEventListener('click', addItem);

    // Первая загрузка
    loadItems();
</script>
</body>
</html>
