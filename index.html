<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мои события</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        
        h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px 0;
            border-radius: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            font-size: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:active {
            opacity: 0.8;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        
        .card h4 {
            margin-bottom: 8px;
            font-size: 18px;
        }
        
        .card p {
            margin-bottom: 8px;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .card small {
            font-size: 12px;
            opacity: 0.6;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }

        .error {
            color: #e53935;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Мои события</h1>
        
        <div class="form-card">
            <h3>➕ Добавить новое</h3>
            <select id="typeSelect">
                <option value="мероприятие">🎉 Мероприятие</option>
                <option value="конкурс">🏆 Конкурс</option>
                <option value="дизайн">🎨 Дизайн</option>
            </select>
            <input type="text" id="titleInput" placeholder="Название *">
            <textarea id="descInput" placeholder="Описание *" rows="3"></textarea>
            <input type="text" id="dateInput" placeholder="Дата (необязательно)">
            <button id="addBtn">➕ Добавить</button>
        </div>
        
        <h3>📋 Список записей</h3>
        <div id="listContainer">
            <div class="loading">Загрузка...</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        let tg = null;
        let currentType = 'events';

        const typeMap = {
            'мероприятие': 'events',
            'конкурс': 'contests',
            'дизайн': 'designs'
        };

        const emojiMap = {
            'events': '🎉',
            'contests': '🏆',
            'designs': '🎨'
        };

        function initTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();

                tg.MainButton.setText("Закрыть");
                tg.MainButton.onClick(() => tg.close());
                tg.MainButton.show();
            }
            loadItems();
        }

        function loadItems() {
            const container = document.getElementById('listContainer');
            const key = `items_${currentType}`;
            const items = JSON.parse(localStorage.getItem(key) || '[]');

            if (items.length > 0) {
                let html = '';
                const emoji = emojiMap[currentType];
                for (let item of items) {
                    html += `
                        <div class="card">
                            <h4>${emoji} ${escapeHtml(item.title)}</h4>
                            <p>${escapeHtml(item.description.substring(0, 100))}${item.description.length > 100 ? '...' : ''}</p>
                            ${item.date ? `<small>📅 ${escapeHtml(item.date)}</small><br>` : ''}
                            <small>🆔 ID: ${item.id}</small>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div class="loading">📭 Пока ничего нет. Добавьте первую запись!</div>';
            }
        }

        function addItem() {
            const type = document.getElementById('typeSelect').value;
            const title = document.getElementById('titleInput').value.trim();
            const description = document.getElementById('descInput').value.trim();
            const date = document.getElementById('dateInput').value.trim();

            if (!title || !description) {
                if (tg) {
                    tg.showPopup({
                        title: 'Ошибка',
                        message: 'Заполните название и описание!',
                        buttons: [{ type: 'ok' }]
                    });
                } else {
                    alert('Заполните название и описание!');
                }
                return;
            }

            const key = `items_${typeMap[type]}`;
            const items = JSON.parse(localStorage.getItem(key) || '[]');

            items.push({ id: Date.now(), title, description, date });
            localStorage.setItem(key, JSON.stringify(items));

            document.getElementById('titleInput').value = '';
            document.getElementById('descInput').value = '';
            document.getElementById('dateInput').value = '';

            if (tg) {
                tg.showPopup({
                    title: 'Успех!',
                    message: 'Запись добавлена ✅',
                    buttons: [{ type: 'ok' }]
                });
            }

            loadItems();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('addBtn').addEventListener('click', addItem);

        document.getElementById('typeSelect').addEventListener('change', (e) => {
            currentType = typeMap[e.target.value];
            loadItems();
        });

        initTelegram();
    </script>
</body>
</html>
