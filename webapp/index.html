<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мои мероприятия</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🎉 Мои события</h1>
            <p>Управляй мероприятиями, конкурсами и дизайнами</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="events">🎉 Мероприятия</button>
            <button class="tab-btn" data-tab="contests">🏆 Конкурсы</button>
            <button class="tab-btn" data-tab="designs">🎨 Дизайны</button>
        </div>

        <div class="add-form">
            <h3>➕ Добавить новое</h3>
            <select id="typeSelect">
                <option value="event">Мероприятие</option>
                <option value="contest">Конкурс</option>
                <option value="design">Дизайн</option>
            </select>
            <input type="text" id="titleInput" placeholder="Название" required>
            <textarea id="descInput" placeholder="Описание" rows="3"></textarea>
            <input type="text" id="dateInput" placeholder="Дата (например, 15 мая 2026)">
            <button id="submitBtn" class="btn-primary">📝 Добавить</button>
        </div>

        <div class="content-list" id="contentList">
            <div class="loading">Загрузка...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
